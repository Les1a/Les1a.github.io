# =============================================
# 站点基本设置 (Basic Site Settings)
# 修改站点标题、描述、URL 等基本信息
# =============================================
locale                   : "en-US"
title                    : "Kejing Xia's Homepage"
title_separator          : "-"
name                     : &name "Kejing Xia"
description              : &description "Georgia Institute of Technology"
url                      : https://les1a.github.io
baseurl                  : "" # 子路径，如 "/blog"
repository               : "Les1a/Les1a.github.io"

# =============================================
# 作者信息 (Site Author)
# 控制侧边栏显示的个人信息和社交链接
# 留空的字段不会显示图标和链接
# 模板文件: /_includes/author-profile.html
# =============================================
author:
  # 基本信息 (Basic Info)
  avatar           : "profile.png"
  name             : "Kejing Xia"
  pronouns         : # 例: "she/her"
  bio              : "Ph.D. student @ Georgia Tech"
  location         : "Atlanta, GA, US"
  employer         : "Georgia Institute of Technology"
  uri              :
  email            : "kxia39@gatech.edu"

  # 学术链接 (Academic Links) — 填写后自动显示在侧边栏
  arxiv            :
  googlescholar    : "https://scholar.google.com/citations?user=dH4SpC0AAAAJ&hl"
  orcid            :
  researchgate     :

  # 代码托管 (Code Repositories)
  github           : "Les1a"

  # 社交媒体 (Social Media) — 取消注释并填写用户名即可启用
  # linkedin         :
  # twitter          :
  # bluesky          :
  # mastodon         :

# =============================================
# 站点功能设置 (Site Settings)
# =============================================
teaser                   :
breadcrumbs              : false
words_per_minute         : 160
future                   : true
read_more                : "disabled"
talkmap_link             : false

# 评论系统 — 如需启用，设置 provider 为 "disqus" 等并填写对应配置
comments:
  provider               :

atom_feed:
  hide                   : false
  path                   :

# 数据分析 — 如需启用 Google Analytics，设置 provider 并填写 tracking_id
analytics:
  provider               : # false (默认), "google", "google-universal", "google-analytics-4"
  google:
    tracking_id          :


# =============================================
# 文件读取配置 (Reading Files)
# =============================================
include:
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - CHANGELOG
  - Capfile
  - Gemfile
  - Gruntfile.js
  - LICENSE
  - README
  - Rakefile
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - config
  - gulpfile.js
  - log
  - node_modules
  - package.json
  - tmp
  - vendor
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"


# =============================================
# Markdown 和转换配置 (Conversion)
# 通常无需修改
# =============================================
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false


# =============================================
# 页面默认设置 (Defaults)
# =============================================
collections:

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true


# =============================================
# 构建配置 (Build Settings)
# 通常无需修改
# =============================================
sass:
  sass_dir: _sass
  style: compressed

permalink: /:categories/:title/
timezone: America/Los_Angeles

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-redirect-from
whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

compress_html:
  clippings: all
  ignore:
    envs: development
